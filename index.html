<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora com JavaScript</title>

    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="container">
        <div class="calc">
            <div class="calc-title">
                <h1>Calculadora</h1>
            </div>
            <input id="num1" type="number">
            <input id="num2" type="number">

            <div class="calc-buttons">
                <button id="soma" onclick="calc('soma')">+</button>
                <button id="subtracao" onclick="calc('subtracao')">-</button>
                <button id="multiplicacao" onclick="calc('multiplicacao')">*</button>
                <button id="divisao" onclick="calc('divisao')">/</button>
            </div>
            
            <input id="output" type="text" readonly>
        </div>
    </div>
    <div class="history">

    </div>    

    <script src="javascript.js"></script>
</body>
</html>
